<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-menna" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E91E63" stop-opacity="0.45" />
      <stop offset="60%" stop-color="#F8BBD0" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15" />
    </radialGradient>
    <linearGradient id="shirt-menna" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E91E63" />
      <stop offset="100%" stop-color="#880E4F" />
    </linearGradient>
    <linearGradient id="skin-menna" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD1A9" />
      <stop offset="50%" stop-color="#FFA87D" />
      <stop offset="100%" stop-color="#E57C4B" />
    </linearGradient>
    <linearGradient id="hair-menna" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A1C28" />
      <stop offset="50%" stop-color="#241119" />
      <stop offset="100%" stop-color="#14080D" />
    </linearGradient>
    <filter id="glow-menna" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow & Cyber Ring -->
  <circle cx="200" cy="200" r="190" fill="url(#bg-menna)" />
  <circle cx="200" cy="200" r="185" fill="none" stroke="#E91E63" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="10 5" />

  <!-- Ring Light behind head (Iconic Content Creator look) -->
  <circle cx="200" cy="155" r="72" fill="none" stroke="#E91E63" stroke-width="8" stroke-opacity="0.7" filter="url(#glow-menna)" />
  <circle cx="200" cy="155" r="72" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.9" />

  <!-- Floating Audio Waves in Background -->
  <g opacity="0.35" stroke="#E91E63" stroke-width="2.5" stroke-linecap="round">
    <!-- Left Waves -->
    <line x1="65" y1="140" x2="65" y2="160" />
    <line x1="72" y1="130" x2="72" y2="170" />
    <line x1="79" y1="145" x2="79" y2="155" />
    <line x1="86" y1="120" x2="86" y2="180" />
    <!-- Right Waves -->
    <line x1="315" y1="145" x2="315" y2="155" />
    <line x1="322" y1="130" x2="322" y2="170" />
    <line x1="329" y1="140" x2="329" y2="160" />
    <line x1="336" y1="120" x2="336" y2="180" />
  </g>

  <!-- Hair - Back flow -->
  <path d="M130 160 C115 100, 160 70, 200 75 C240 70, 285 100, 270 160 C290 220, 290 280, 280 330 C270 290, 260 260, 255 200 C250 120, 200 115, 200 115 C200 115, 150 120, 145 200 C140 260, 130 290, 120 330 C110 280, 110 220, 130 160 Z" fill="url(#hair-menna)" />

  <!-- Body / Stylish Pink Jacket -->
  <path d="M110 380 C110 300, 290 300, 290 380 Z" fill="url(#shirt-menna)" />
  <path d="M150 380 C150 330, 250 330, 250 380 Z" fill="#880E4F" opacity="0.8" />
  <!-- Neon seams on jacket -->
  <path d="M140 330 L165 380 M260 330 L235 380" stroke="#E91E63" stroke-width="2" opacity="0.6" />

  <!-- Neck -->
  <path d="M178 250 L222 250 L218 335 L182 335 Z" fill="url(#skin-menna)" />
  <ellipse cx="200" cy="275" rx="18" ry="6" fill="#880E4F" opacity="0.3" />

  <!-- Head/Face -->
  <ellipse cx="200" cy="200" rx="60" ry="76" fill="url(#skin-menna)" />

  <!-- Ears & Gold Cyber Earrings -->
  <ellipse cx="137" cy="195" rx="10" ry="16" fill="url(#skin-menna)" />
  <ellipse cx="263" cy="195" rx="10" ry="16" fill="url(#skin-menna)" />
  <circle cx="137" cy="205" r="4.5" fill="#FFD700" filter="url(#glow-menna)" />
  <circle cx="263" cy="205" r="4.5" fill="#FFD700" filter="url(#glow-menna)" />

  <!-- Eyes with Magenta Eye Shadow -->
  <!-- Shadow -->
  <ellipse cx="172" cy="183" rx="16" ry="11" fill="#E91E63" opacity="0.35" />
  <ellipse cx="228" cy="183" rx="16" ry="11" fill="#E91E63" opacity="0.35" />
  <!-- Eyes -->
  <ellipse cx="172" cy="185" rx="13" ry="9" fill="#FFFFFF" />
  <ellipse cx="228" cy="185" rx="13" ry="9" fill="#FFFFFF" />
  <circle cx="172" cy="185" r="6.5" fill="#880E4F" />
  <circle cx="228" cy="185" r="6.5" fill="#880E4F" />
  <circle cx="174" cy="183" r="2" fill="#FFFFFF" />
  <circle cx="230" cy="183" r="2" fill="#FFFFFF" />
  <!-- Eyelashes -->
  <path d="M156 182 Q172 172 188 182" fill="none" stroke="#212121" stroke-width="3" stroke-linecap="round" />
  <path d="M212 182 Q228 172 244 182" fill="none" stroke="#212121" stroke-width="3" stroke-linecap="round" />

  <!-- Eyebrows -->
  <path d="M156 166 Q172 156 186 165" fill="none" stroke="#212121" stroke-width="3.5" stroke-linecap="round" />
  <path d="M214 165 Q228 156 244 166" fill="none" stroke="#212121" stroke-width="3.5" stroke-linecap="round" />

  <!-- Nose -->
  <path d="M200 192 L204 212 L196 212" fill="none" stroke="#A1887F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Mouth / Full Lip Gloss -->
  <path d="M185 238 Q200 248 215 238 Q200 241 185 238 Z" fill="#E91E63" stroke="#C2185B" stroke-width="1.5" />
  <!-- Lip highlight -->
  <path d="M192 239 Q200 243 208 239" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" />

  <!-- Professional Studio Microphone in Foreground -->
  <g filter="drop-shadow(0 0 4px rgba(233,30,99,0.3))">
    <!-- Mic Stand -->
    <line x1="228" y1="352" x2="228" y2="380" stroke="#37474F" stroke-width="4.5" stroke-linecap="round" />
    <path d="M214 380 L242 380" stroke="#37474F" stroke-width="3" stroke-linecap="round" />
    <!-- Shock mount ring -->
    <ellipse cx="228" cy="344" rx="18" ry="9" fill="none" stroke="#E91E63" stroke-width="2.5" />
    <!-- Connector joint -->
    <circle cx="228" cy="350" r="3" fill="#37474F" />
    <!-- Microphone body/capsule -->
    <rect x="217" y="318" width="22" height="42" rx="11" fill="#37474F" stroke="#E91E63" stroke-width="1.5" />
    <!-- Grille (top half) -->
    <rect x="217" y="318" width="22" height="21" rx="11" fill="#ECEFF1" stroke="#37474F" stroke-width="1.5" />
    <!-- Grille lines -->
    <line x1="228" y1="318" x2="228" y2="339" stroke="#37474F" stroke-width="1" />
    <line x1="218" y1="329" x2="238" y2="329" stroke="#37474F" stroke-width="1" />
  </g>
</svg>
